about_content: | # this will include new lines to allow paragraphs
 Hi, I'm Yinan. I am interested in all the ways in which music and audio helps us to enjoy life. I am currently seeking job opportunities as a machine learning developer or a data scientist.
 
  **Skills:**
  -	Python: TensorFlow/PyTorch, AWS
