content:
  - title: Work Experience # Title for the section
    layout: list
    content:
      - layout: left
        title: EERS Global Technologies Inc.
        sub_title: Machine Learning Developer
        caption: March 2022 - March 2023
        link: https://www.eers.ca/
        # quote: >
          # Short description of the company (optional)
        description: | # this will include new lines to allow paragraphs
          **Biosignal Monitoring | TensorFlow, PyTorch, AWS**
          - Developed a machine learning experiment framework used by 2 internal teams, including feature extraction and participant-wise cross-validation.
          - Annotated dataset of 24 hours in-ear audio. Extracted and analyzed spectral features, including Mel-spectrogram, MFCC, and modulation spectrogram (image data).
          - Implemented different state-of-arts deep learning architectures (RNN, UNet) for biosignal monitoring with TensorFlow or Pytorch on AWS.
          - Applied transfer learning using existing pre-trained models (CNN) on the custom dataset.
          - Implemented a trainable frontend as a custom layer in TensorFlow.
          
          **Speech Intelligibility Enhancement | TensorFlow, MATLAB**
          - Finetuned SpeechBrain pre-trained models (transformer) for speech intelligibility enhancement.
          - Completed a machine learning experiment framework in MATLAB and Python used by 2 internal teams, including audio preprocessing, feature extraction, and participant-wise leave-one-out cross-validation.
          - Extracted and analyzed temporal and spectral features on in-ear audio data in a real-time manner, as well as higher-level features, such as MFCC.
          - Explored the usage of IMU data in terms of speech intelligibility enhancement.
          - Investigated the impact of different DSP method on the linear relationship between different features and ground truth.
          - Developed an end-to-end machine learning framework (LR/Decision Tree) for out-of-ear detection.
